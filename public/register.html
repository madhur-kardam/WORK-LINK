<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - WorkLink</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 500px;
            width: 100%;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-header {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            padding: 40px;
            text-align: center;
            color: white;
        }

        .register-header .logo {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .register-header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .register-header p {
            opacity: 0.95;
            font-size: 1.1em;
        }

        .register-body {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: #4b5563;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 1em;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.95em;
            display: none;
            border-left: 4px solid #dc2626;
        }

        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.95em;
            display: none;
            border-left: 4px solid #10b981;
        }

        .register-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .register-btn:hover {
            background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }

        .register-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #e5e7eb;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            color: #6b7280;
            position: relative;
            z-index: 1;
        }

        .login-link {
            text-align: center;
            color: #6b7280;
            font-size: 1em;
        }

        .login-link a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .user-type-selection {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .user-type-card {
            padding: 20px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }

        .user-type-card:hover {
            border-color: #2563eb;
            background: #eff6ff;
        }

        .user-type-card input[type="radio"] {
            display: none;
        }

        .user-type-card input[type="radio"]:checked + label {
            color: #2563eb;
        }

        .user-type-card.selected {
            border-color: #2563eb;
            background: #eff6ff;
        }

        .user-type-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .user-type-title {
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 5px;
        }

        .user-type-desc {
            font-size: 0.85em;
            color: #6b7280;
        }

        @media (max-width: 500px) {
            .register-header h1 {
                font-size: 1.5em;
            }
            .register-body {
                padding: 30px 20px;
            }
            .user-type-selection {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <div class="logo">🔧</div>
            <h1>Join WorkLink</h1>
            <p>Create your account to get started</p>
        </div>

        <div class="register-body">
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" required placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="your.email@example.com">
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" required placeholder="+91 98765 43210">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="Create a strong password" minlength="6">
                </div>

                <div class="form-group">
                    <label>I am a:</label>
                    <div class="user-type-selection">
                        <div class="user-type-card" onclick="selectUserType('seeker', this)">
                            <div class="user-type-icon">👷</div>
                            <div class="user-type-title">Job Seeker</div>
                            <div class="user-type-desc">Looking for work</div>
                            <input type="radio" name="userType" value="seeker" id="seeker" required>
                        </div>
                        <div class="user-type-card" onclick="selectUserType('poster', this)">
                            <div class="user-type-icon">💼</div>
                            <div class="user-type-title">Job Poster</div>
                            <div class="user-type-desc">Hiring workers</div>
                            <input type="radio" name="userType" value="poster" id="poster" required>
                        </div>
                    </div>
                </div>

                <button type="submit" class="register-btn" id="registerBtn">Create Account</button>
            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <div class="login-link">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>
<script>
    const API_URL = 'http://localhost:3000/api';

    function selectUserType(type, element) {
        document.querySelectorAll('.user-type-card').forEach(card => {
            card.classList.remove('selected');
        });

        element.classList.add('selected');
        document.getElementById(type).checked = true;
    }

    function showError(message) {
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';

        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 5000);
    }

    function showSuccess(message) {
        const successDiv = document.getElementById('successMessage');
        successDiv.textContent = message;
        successDiv.style.display = 'block';
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const registerBtn = document.getElementById('registerBtn');
        registerBtn.disabled = true;
        registerBtn.textContent = 'Creating Account...';

        const formData = new FormData(e.target);

        const data = {
            name: formData.get('name').trim(),
            email: formData.get('email').trim(),
            phone: formData.get('phone').trim(),
            password: formData.get('password'),
            userType: formData.get('userType')
        };

        // Email validation
        const emailRegex = /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9-]{2,}\.[a-zA-Z]{2,}$/;

        if (!emailRegex.test(data.email)) {
            showError('Please enter a valid email address (e.g. name@gmail.com)');
            registerBtn.disabled = false;
            registerBtn.textContent = 'Create Account';
            return;
        }

// Phone validation
const phone = data.phone;

// Must start with 6,7,8,9 and contain exactly 10 digits
const validIndianMobile = /^[6-9][0-9]{9}$/;

// Reject numbers where all digits are the same
const sameDigitPattern = /^(\d)\1{9}$/;

// Common fake/test numbers
const blockedNumbers = [
    '0123456789',
    '1234567890',
    '9876543210',
    '0987654321',
    '9000000000',
    '9999999999',
    '8888888888',
    '7777777777',
    '6666666666',
    '9898989898',
    '9090909090',
    '9191919191',
    '8080808080'
];

if (
    !validIndianMobile.test(phone) ||
    sameDigitPattern.test(phone) ||
    blockedNumbers.includes(phone)
) {
    showError('Please enter a valid phone number');
    registerBtn.disabled = false;
    registerBtn.textContent = 'Create Account';
    return;
}

        if (!data.userType) {
            showError('Please select whether you are a Job Seeker or Job Poster');
            registerBtn.disabled = false;
            registerBtn.textContent = 'Create Account';
            return;
        }

        try {
            const response = await fetch(`${API_URL}/auth/register`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (response.ok) {

                localStorage.setItem('token', result.token);
                localStorage.setItem('user', JSON.stringify(result.user));

                showSuccess('Account created successfully! Redirecting...');

                setTimeout(() => {
                    if (result.user.userType === 'poster') {
                        window.location.href = 'poster-dashboard.html';
                    } else {
                        window.location.href = 'index-auth.html';
                    }
                }, 1500);

            } else {

                showError(result.error || 'Registration failed');
                registerBtn.disabled = false;
                registerBtn.textContent = 'Create Account';

            }

        } catch (error) {

            console.error('Registration error:', error);
            showError('Network error. Please check your connection.');
            registerBtn.disabled = false;
            registerBtn.textContent = 'Create Account';

        }
    });
</script>
</body>
</html>
